# aztec-watcher config example
# Run `aztec-watcher init` to generate your own aztec-watcher.config.yaml

packages:
  - name: "@aztec/aztec.js"
    tags: [rc, latest]
  - name: "@aztec/accounts"
    tags: [rc, latest]
    check_schnorr_class_id: true
  - name: "@aztec/wallets"
    tags: [rc, latest]
  - name: "@aztec/pxe"
    tags: [rc, latest]

notify:
  slack:
    webhook_url: ${SLACK_WEBHOOK_URL}

# Path to the JSON state file.
# In GitHub Actions: committed back after each run.
state_path: data/state.json
