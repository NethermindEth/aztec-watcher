# aztec-watch.config.yaml — generated by `aztec-watch setup`
# Copy this file to aztec-watch.config.yaml and fill in your values.
# The actual config file is gitignored. Only this example is committed.

packages:
  - name: "@aztec/aztec.js"
    tags: [rc, latest]
  - name: "@aztec/accounts"
    tags: [rc, latest]
    check_schnorr_class_id: true
  - name: "@aztec/wallets"
    tags: [rc, latest]
  - name: "@aztec/pxe"
    tags: [rc, latest]

notify:
  slack:
    webhook_url: ${SLACK_WEBHOOK_URL}
  telegram:
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}

# Collapse updates arriving within this window into a single digest message.
# Aztec is a monorepo — all 60+ packages bump simultaneously.
# Default: 300 seconds (5 minutes)
digest_window_seconds: 300

# Path to the SQLite state database.
# Locally: gitignored. In GitHub Actions: committed back after each run.
db_path: data/state.db
