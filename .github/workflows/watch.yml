name: aztec-watcher

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:          # allow manual trigger from Actions tab

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to commit state.json back to the repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run aztec-watcher
        run: npm run watch:run
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      # Commit the state file back so the next run sees the current state.
      # [skip ci] prevents this commit from triggering another workflow run.
      - name: Commit state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update aztec-watcher state [skip ci]"
          file_pattern: "data/state.json"
